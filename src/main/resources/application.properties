# Server
server.port=8080
spring.application.name=db_hrms

# DataSource ??c t? env khi ch?y Docker, fallback local khi dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_hrms}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Keycloak OAuth2
spring.security.oauth2.client.provider.keycloak.issuer-uri=\
  ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI:\
  http://localhost:8180/realms/hrms}

spring.security.oauth2.client.registration.keycloak.client-id=\
  ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID:hrms-client}

spring.security.oauth2.client.registration.keycloak.client-secret=\
  ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET:YOUR_CLIENT_SECRET}

spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

spring.security.oauth2.resourceserver.jwt.issuer-uri=\
  ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:\
  http://localhost:8180/realms/hrms}

# App & Keycloak endpoints
app.base-url=${APP_BASE_URL:http://localhost:8081}
keycloak.logout-url=${KEYCLOAK_LOGOUT_URL:http://localhost:8180/realms/hrms/protocol/openid-connect/logout}
keycloak.login-url=${KEYCLOAK_LOGIN_URL:http://localhost:8180/realms/hrms/protocol/openid-connect/auth}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:hrms-client}

# Keycloak Admin
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8180}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:hrms}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}